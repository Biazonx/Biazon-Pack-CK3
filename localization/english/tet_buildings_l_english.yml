 building_teutonic_castle_03:1 "Teutonic Order Fortress"
 building_type_teutonic_castle_03:1 "Teutonic Fortress"
 building_type_teutonic_castle_03_desc:1 "A Teutonic Fortress. The Teutonic Fortress's are massive works of German engineering. These Huge fortress's have countless towers and formidable defenses. A Landmeister of the order will usually use these massive castles to stage their attacks and schemes. If you attack this fortress you better be prepared for an endless siege."
