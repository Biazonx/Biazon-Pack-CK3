 building_teutonic_citadel_03:1 "Teutonic Order Citadel"
 building_type_teutonic_citadel_03:1 "Teutonic Citadel"
 building_type_teutonic_citadel_03_desc:1 "The Teutonic Citadel. An enormous Citadel has been built for The Hochmeister of the Tuetonic Order as a shining example of their Iron power in the Batlics. The Teutonic Order uses this Citadel to keep the Baltic Pagans in check. The walls are high and the defenders are plenty here, this will be no light seige, the Hochmeister welcomes any pagan willing to try."
