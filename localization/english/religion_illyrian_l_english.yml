 select_personal_deity_illyrian_decision:0 "Select a Totem"
 select_personal_deity_illyrian_decision_tooltip:0 "Think about the aspects of the wild."
 select_personal_deity_illyrian_decision_desc:1 "#F It is not uncommon for [ROOT.Char.GetFaith.GetAdherentNamePluralNoTooltip] to single out a specific totem that suits their particular tastes and aims in life for special attention.\n\nI should contemplate these divine forces of nature and decide which one calls to me the most.#!"
 select_personal_deity_illyrian_decision_confirm:0 "Adopt a particular totem"
 select_personal_deity_illyrian_decision_tt:1 "You begin to live your life according to the values of"
 select_personal_deity_illyrian_decision.select_bee:0 "$bhakti_illyrian_bee$, the tireless bee"
 select_personal_deity_illyrian_decision.select_eagle:0 "$bhakti_illyrian_eagle$, the proud eagle"
 select_personal_deity_illyrian_decision.select_goat:0 "$bhakti_illyrian_goat$, the sylvan goat"
 select_personal_deity_illyrian_decision.select_serpent:0 "$bhakti_illyrian_serpent$, the sacred serpent"
 select_personal_deity_illyrian_decision.select_wolf:0 "$bhakti_illyrian_wolf$, the ferocious wolf"
 
 bhakti_illyrian_bee:0 "Bleta"
 bhakti_illyrian_bee_desc:0 "This character follows the totem of the bee, symbolic of life and considered spiritually of equal status to humans."
 bhakti_illyrian_eagle:0 "Shqiponja"
 bhakti_illyrian_eagle_desc:0 "This character follows the totem of the eagle, symbol of freedom and heroism and emblem of the Albanian people."
 bhakti_illyrian_goat:0 "Dhia e Egër"
 bhakti_illyrian_goat_desc:0 "This character follows the totem of the wild goat, associated with forests."
 bhakti_illyrian_serpent:0 "Gjarpri"
 bhakti_illyrian_serpent_desc:0 "This character's totem is the serpent, associated with earth, water, sun, hearth and ancestor cults, as well as destiny, good fortune and fertility."
 bhakti_illyrian_wolf:0 "Ujku"
 bhakti_illyrian_wolf_desc:0 "This character's totem is the fiercesome wolf."
 
 religious_decision.0103.t:0 "Selecting a Totem"
 religious_decision.0103.desc:0 "The court of [ROOT.Char.GetFaith.WildernessGodName] is larger, but by devoting myself to one of [ROOT.Char.GetFaith.WildernessGodHerHis] servants in particular, I may be able to share in some of its aspect and blessings."
 religious_decision.0103.bee:0 "$bhakti_illyrian_bee$, the industrious bee, emblem of life."
 religious_decision.0103.eagle:0 "$bhakti_illyrian_eagle$, the proud and mighty eagle."
 religious_decision.0103.goat:0 "$bhakti_illyrian_goat$, the wild goat, denizen of the forest."
 religious_decision.0103.serpent:0 "$bhakti_illyrian_serpent$, the sacred serpent."
 religious_decision.0103.wolf:0 "$bhakti_illyrian_wolf$, the ferocious wolf."
 religious_decision.0103.optout:0 "$religious_decision.0101.flavor$"
 religious_decision.0103.flavor:0 "$religious_decision.0101.flavor$"
 
bzn_albanian_paganism_decision: "Revive the Old Albanian Gods"
bzn_albanian_paganism_decision_desc: "Before the cross and the crescent cast their long shadows upon our mountains, the ancestors of the Shqiptar honored the ancient spirits of the land. In the peaks, forests, and rivers, the old gods still whisper. Perhaps it is time to cast aside foreign creeds and rekindle the sacred fire of our forebears."
bzn_albanian_paganism_decision_confirm: "The old gods shall rise again."
bzn_albanian_paganism_decision_tooltip: "You will abandon your current Faith and embrace the ancient pagan beliefs of the Albanian people. Your capital and court will follow your example."

